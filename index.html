<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Bike Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 30px; }
    .header h1 { margin: 0; font-size: 28px; }
    .nav { background: #fff; padding: 0 20px; display: flex; gap: 5px; border-bottom: 1px solid #e0e0e0; }
    .nav-item { padding: 15px 20px; cursor: pointer; border-radius: 8px; border: none; background: none; font-size: 14px; font-weight: 600; color: #333; }
    .nav-item.active { background: #007AFF; color: #fff; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border-left: 4px solid #007AFF; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat-icon { font-size: 32px; }
    .stat-info h3 { font-size: 28px; font-weight: bold; margin: 0; }
    .stat-info p { margin: 5px 0 0; color: #666; }
    .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { margin-top: 0; margin-bottom: 15px; font-size: 20px; }
    .bike-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .bike-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #007AFF; color: #fff; }
    .btn-success { background: #4CAF50; color: #fff; }
    .btn-danger { background: #F44336; color: #fff; }
    .btn-warning { background: #FF9800; color: #fff; }
    #map { height: 500px; border-radius: 12px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 6px; color: #666; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
    .tag { padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    .tag-success { background: #E8F5E9; color: #4CAF50; }
    .tag-danger { background: #FFEBEE; color: #F44336; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🚴 E-Bike Manager</h1>
    <p>电瓶车智能管理系统</p>
  </header>

  <nav class="nav">
    <button class="nav-item active" onclick="showPage('dashboard')">📊 仪表盘</button>
    <button class="nav-item" onclick="showPage('bikes')">🚲 车辆管理</button>
    <button class="nav-item" onclick="showPage('map')">🗺️ 骑行地图</button>
    <button class="nav-item" onclick="showPage('ads')">📢 广告管理</button>
    <button class="nav-item" onclick="showPage('game')">🎁 骑行游戏</button>
  </nav>

  <div class="container">
    <div id="page-dashboard" class="page active">
      <div class="stats">
        <div class="stat-card" style="border-left-color: #4CAF50;">
          <div class="stat-icon">🟢</div><div class="stat-info"><h3 id="stat-online">0</h3><p>在线车辆</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #F44336;">
          <div class="stat-icon">🔴</div><div class="stat-info"><h3 id="stat-offline">0</h3><p>离线车辆</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #2196F3;">
          <div class="stat-icon">📢</div><div class="stat-info"><h3 id="stat-ads">0</h3><p>活跃广告</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #FF9800;">
          <div class="stat-icon">🎁</div><div class="stat-info"><h3 id="stat-gifts">0</h3><p>已获礼包</p></div>
        </div>
      </div>
      <div class="card"><h2>当前车辆</h2><div id="current-bike-info"></div></div>
    </div>

    <div id="page-bikes" class="page">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>车辆管理</h2><button class="btn btn-primary" onclick="openModal('add-bike')">➕ 添加车辆</button>
      </div>
      <div id="bikes-list" class="bike-grid"></div>
    </div>

    <div id="page-map" class="page">
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button class="btn btn-success" id="btn-start-ride" onclick="toggleRide()">▶️ 开始骑行</button>
        <button class="btn btn-warning" onclick="placeRandomGift()">➕ 放置礼包</button>
      </div>
      <div id="map"></div>
      <div class="card" id="ride-info"></div>
    </div>

    <div id="page-ads" class="page">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>广告管理</h2><button class="btn btn-primary" onclick="openModal('add-ad')">➕ 添加广告</button>
      </div>
      <div id="ads-list"></div>
    </div>

    <div id="page-game" class="page">
      <div class="stats">
        <div class="stat-card" style="border-left-color: #FF9800;">
          <div class="stat-icon">🎁</div><div class="stat-info"><h3 id="game-available">0</h3><p>可用礼包</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #4CAF50;">
          <div class="stat-icon">✓</div><div class="stat-info"><h3 id="game-collected">0</h3><p>已收集</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #F57C00;">
          <div class="stat-icon">🎫</div><div class="stat-info"><h3 id="game-coupons">0</h3><p>优惠券</p></div>
        </div>
        <div class="stat-card" style="border-left-color: #0288D1;">
          <div class="stat-icon">⭐</div><div class="stat-info"><h3 id="game-points">0</h3><p>积分</p></div>
        </div>
      </div>
      <div class="card"><h2>操作</h2><p style="color: #666;">在骑行地图中可以找到礼包，收集即可获得优惠券和积分奖励！</p></div>
      <div class="card"><h2>我的礼包</h2><div id="user-gifts-list"></div></div>
    </div>
  </div>

  <div id="modal-add-bike" class="modal"><div class="modal-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;"><h3>添加车辆</h3><button class="btn" onclick="closeModal('add-bike')">×</button></div>
    <form onsubmit="addBike(event)"><div class="form-group"><label>车辆名称</label><input type="text" id="bike-name" required></div><div class="form-group"><label>车牌号</label><input type="text" id="bike-plate" required></div><div class="form-group"><label>车型</label><input type="text" id="bike-model" required></div><div class="form-group"><label>颜色</label><input type="text" id="bike-color" required></div><button type="submit" class="btn btn-primary" style="width: 100%;">保存</button></form>
  </div></div>

  <div id="modal-add-ad" class="modal"><div class="modal-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;"><h3>添加广告</h3><button class="btn" onclick="closeModal('add-ad')">×</button></div>
    <form onsubmit="addAd(event)"><div class="form-group"><label>广告标题</label><input type="text" id="ad-title" required></div><div class="form-group"><label>广告内容</label><textarea id="ad-content" required rows="3"></textarea></div><button type="submit" class="btn btn-primary" style="width: 100%;">保存</button></form>
  </div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let bikes = [{id:1,name:'小蓝',plate:'A12345',model:'雅迪 V1',color:'蓝色',status:'online',battery:85,gps:{lat:39.9042,lng:116.4074,speed:0}},{id:2,name:'小红',plate:'B67890',model:'爱玛 F3',color:'红色',status:'online',battery:92,gps:{lat:39.915,lng:116.417,speed:0}},{id:3,name:'小绿',plate:'C11111',model:'绿源 G5',color:'绿色',status:'offline',battery:45,gps:{lat:39.895,lng:116.397,speed:0}}];
    let ads = [{id:1,title:'夏日饮料特惠',content:'买一送一，限时优惠！',duration:30,priority:1,active:true},{id:2,title:'电动车维修保养',content:'专业维修，上门服务',duration:45,priority:2,active:true}];
    let gifts = [{id:1,type:'coupon',name:'10元优惠券',value:10,lat:39.9045,lng:116.4078,collected:false},{id:2,type:'points',name:'100积分',value:100,lat:39.905,lng:116.408,collected:false},{id:3,type:'coupon',name:'免费骑行券',value:50,lat:39.9038,lng:116.407,collected:false}];
    let userGifts = [], currentBike = bikes[0], isRiding = false, rideInterval = null, map = null, markers = [];
    function showPage(p){document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');event.target.classList.add('active');if(p==='map'&&!map)initMap()}
    function updateStats(){document.getElementById('stat-online').textContent=bikes.filter(b=>b.status==='online').length;document.getElementById('stat-offline').textContent=bikes.filter(b=>b.status==='offline').length;document.getElementById('stat-ads').textContent=ads.filter(a=>a.active).length;document.getElementById('stat-gifts').textContent=userGifts.length;document.getElementById('game-available').textContent=gifts.filter(g=>!g.collected).length;document.getElementById('game-collected').textContent=userGifts.length;document.getElementById('game-coupons').textContent=userGifts.filter(g=>g.type==='coupon').length;document.getElementById('game-points').textContent=userGifts.filter(g=>g.type==='points').reduce((s,g)=>s+g.value,0)}
    function renderCurrentBike(){if(!currentBike)return;document.getElementById('current-bike-info').innerHTML=`<table class="table"><tr><th>车辆名称</th><td>🚲 ${currentBike.name}</td></tr><tr><th>车牌号</th><td>${currentBike.plate}</td></tr><tr><th>车型</th><td>${currentBike.model}</td></tr><tr><th>颜色</th><td>${currentBike.color}</td></tr><tr><th>电量</th><td>🔋 ${currentBike.battery}%</td></tr><tr><th>速度</th><td>⚡ ${currentBike.gps.speed} km/h</td></tr><tr><th>状态</th><td>${currentBike.status==='online'?'<span class="tag tag-success">在线</span>':'<span class="tag tag-danger">离线</span>'}</td></tr></table>`}
    function renderBikes(){document.getElementById('bikes-list').innerHTML=bikes.map(b=>`<div class="bike-card"><div style="display:flex;justify-content:space-between;margin-bottom:15px;"><strong style="font-size:18px;">🚲 ${b.name}</strong><span style="width:12px;height:12px;border-radius:50%;background:${b.status==='online'?'#4CAF50':'#F44336'}"></span></div><table class="table"><tr><th>车牌</th><td>${b.plate}</td></tr><tr><th>车型</th><td>${b.model}</td></tr><tr><th>电量</th><td>🔋 ${b.battery}%</td></tr><tr><th>速度</th><td>⚡ ${b.gps.speed} km/h</td></tr></table><div style="margin-top:15px;display:flex;gap:8px;"><button class="btn btn-success" style="flex:1;" onclick="selectBike(${b.id})">选择</button><button class="btn btn-danger" style="flex:1;" onclick="deleteBike(${b.id})">删除</button></div></div>`).join('')}
    function renderAds(){document.getElementById('ads-list').innerHTML=ads.map(a=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><strong style="font-size:18px;">${a.title}</strong><span class="tag ${a.active?'tag-success':'tag-danger'}">${a.active?'投放中':'已暂停'}</span></div><p style="color:#666;margin-bottom:10px;">${a.content}</p><p style="color:#999;font-size:13px;">时长:${a.duration}秒</p></div>`).join('')}
    function renderUserGifts(){const c=document.getElementById('user-gifts-list');if(!userGifts.length){c.innerHTML='<div style="text-align:center;padding:40px;color:#999;"><span style="font-size:60px;">📭</span><p>还没有收集到礼包</p></div>';return}c.innerHTML=userGifts.map(g=>`<div style="display:flex;align-items:center;gap:15px;padding:12px;background:#f9f9f9;border-radius:8px;margin-bottom:10px;"><span style="font-size:24px;">${g.type==='coupon'?'🎫':'⭐'}</span><div style="flex:1;"><strong>${g.name}</strong><span style="color:#666;margin-left:10px;">${g.type==='coupon'?`价值${g.value}元`:`${g.value}积分`}</span></div></div>`).join('')}
    function initMap(){map=L.map('map').setView([39.9042,116.4074],14);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);updateMapMarkers()}
    function updateMapMarkers(){if(!map)return;markers.forEach(m=>map.removeLayer(m));markers=[];bikes.forEach(b=>{const m=L.marker([b.gps.lat,b.gps.lng]).addTo(map).bindPopup(`<b>${b.name}</b><br/>速度:${b.gps.speed} km/h<br/>电量:${b.battery}%`);markers.push(m)});gifts.filter(g=>!g.collected).forEach(g=>{const i=L.divIcon({html:'<div style="font-size:35px;">🎁</div>',className:'',iconSize:[45,45]});const m=L.marker([g.lat,g.lng],{icon:i}).addTo(map).on('click',()=>{if(confirm(`你发现了"${g.name}"！是否领取？`)){collectGift(g.id);alert(`恭喜！你获得了${g.name}！`)}});markers.push(m)})}
    function openModal(id){document.getElementById('modal-'+id).classList.add('show')}
    function closeModal(id){document.getElementById('modal-'+id).classList.remove('show')}
    function addBike(e){e.preventDefault();bikes.push({id:Date.now(),name:document.getElementById('bike-name').value,plate:document.getElementById('bike-plate').value,model:document.getElementById('bike-model').value,color:document.getElementById('bike-color').value,status:'online',battery:100,gps:{lat:39.9042+(Math.random()-.5)*.01,lng:116.4074+(Math.random()-.5)*.01,speed:0}});closeModal('add-bike');e.target.reset();renderAll()}
    function deleteBike(id){if(confirm('确定要删除这辆车吗？')){bikes=bikes.filter(b=>b.id!==id);renderAll()}}
    function selectBike(id){currentBike=bikes.find(b=>b.id===id);renderAll()}
    function addAd(e){e.preventDefault();ads.push({id:Date.now(),title:document.getElementById('ad-title').value,content:document.getElementById('ad-content').value,duration:30,priority:1,active:true});closeModal('add-ad');e.target.reset();renderAll()}
    function collectGift(id){const g=gifts.find(g=>g.id===id);if(g){g.collected=true;userGifts.push({...g,collectedAt:new Date()});renderAll()}}
    function placeRandomGift(){const t=['coupon','points','coupon'];const type=t[Math.floor(Math.random()*t.length)];const n={coupon:['5元优惠券','10元优惠券','20元优惠券','免费骑行券'],points:['50积分','100积分','200积分']};const v={coupon:[5,10,20,50],points:[50,100,200]};const i=Math.floor(Math.random()*n[type].length);gifts.push({id:Date.now(),type,name:n[type][i],value:v[type][i],lat:39.9042+(Math.random()-.5)*.01,lng:116.4074+(Math.random()-.5)*.01,collected:false});renderAll();alert('成功！已在地图上随机放置一个礼包！')}
    function toggleRide(){isRiding=!isRiding;const btn=document.getElementById('btn-start-ride');btn.textContent=isRiding?'⏸️ 停止骑行':'▶️ 开始骑行';btn.className='btn '+(isRiding?'btn-danger':'btn-success');if(isRiding){rideInterval=setInterval(()=>{if(currentBike){currentBike.gps.lat+=(Math.random()-.5)*.001;currentBike.gps.lng+=(Math.random()-.5)*.001;currentBike.gps.speed=Math.floor(Math.random()*30)+5;renderAll()}},3000)}else{clearInterval(rideInterval);if(currentBike)currentBike.gps.speed=0;renderAll()}}
    function renderAll(){updateStats();renderCurrentBike();renderBikes();renderAds();renderUserGifts();updateMapMarkers()}
    renderAll();
  </script>
</body>
</html>
